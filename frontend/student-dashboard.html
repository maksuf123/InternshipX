<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Student Dashboard | InternshipX</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <header class="dashboard-header">
        <div class="logo">
            <h2>
                <a
                    class="logo-link"
                    href="index.html"
                    aria-label="Go to InternshipX homepage">
                    Internship<span>X</span>
                </a>
            </h2>
        </div>

        <div class="header-right">
            <span id="studentName">Welcome</span>

            <button
                id="logoutBtn"
                class="btn-secondary">
                Logout
            </button>
        </div>
    </header>

    <main class="dashboard-container">
        <section class="welcome-card">
            <h1>Welcome Back</h1>
            <p>
                Explore internships, shortlist the right roles, and apply with
                confidence from one dashboard.
            </p>
        </section>

        <section class="action-section">
            <button
                id="myApplicationsBtn"
                class="btn-primary">
                My Applications
            </button>
        </section>

        <section class="search-section">
            <input
                type="text"
                id="searchInput"
                placeholder="Search by title, company, location, or skill...">
        </section>

        <section class="stats-grid">
            <div class="stat-card">
                <h3>Available Internships</h3>
                <h2 id="availableInternships">0</h2>
            </div>

            <div class="stat-card">
                <h3>My Applications</h3>
                <h2 id="myApplications">0</h2>
            </div>

            <div class="stat-card">
                <h3>Accepted</h3>
                <h2 id="acceptedApplications">0</h2>
            </div>
        </section>

        <section class="internship-section">
            <div class="section-title">
                <h2>Browse Internships</h2>
            </div>

            <div
                id="internshipList"
                class="internship-list">
                <div class="empty-state">
                    <h3>Loading internships...</h3>
                </div>
            </div>
        </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
