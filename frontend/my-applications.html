<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>My Applications | InternshipX</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <header class="dashboard-header">
        <div class="logo">
            <h2>Internship<span>X</span></h2>
        </div>

        <div class="header-right">
            <span id="studentName">Welcome</span>

            <button
                id="logoutBtn"
                class="btn-secondary">
                Logout
            </button>
        </div>
    </header>

    <main class="dashboard-container">
        <section class="welcome-card">
            <h1>My Applications</h1>
            <p>Review the internships you have applied for and follow each status.</p>
        </section>

        <section class="action-section">
            <button
                class="btn-secondary"
                onclick="window.location.href='student-dashboard.html'">
                Back to Dashboard
            </button>
        </section>

        <section class="internship-section">
            <div class="section-title">
                <h2>Applications</h2>
            </div>

            <div id="applicationList">
                <div class="empty-state">
                    <h3>Loading applications...</h3>
                </div>
            </div>
        </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
