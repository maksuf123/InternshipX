<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Applicants | InternshipX</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <header class="dashboard-header">
        <div class="logo">
            <h2>
                <a
                    class="logo-link"
                    href="index.html"
                    aria-label="Go to InternshipX homepage">
                    Internship<span>X</span>
                </a>
            </h2>
        </div>

        <div class="header-right">
            <span id="companyName">Welcome</span>

            <button
                id="logoutBtn"
                class="btn-secondary">
                Logout
            </button>
        </div>
    </header>

    <main class="dashboard-container">
        <section class="welcome-card">
            <h1>Internship Applications</h1>
            <p>Review student profiles and move applications through the hiring flow.</p>
        </section>

        <section class="action-section">
            <button
                class="btn-secondary"
                onclick="window.location.href='company-dashboard.html'">
                Back to Dashboard
            </button>
        </section>

        <section class="stats-grid">
            <div class="stat-card">
                <h3>Total Applications</h3>
                <h2 id="totalApplications">0</h2>
            </div>

            <div class="stat-card">
                <h3>Pending</h3>
                <h2 id="pendingApplications">0</h2>
            </div>

            <div class="stat-card">
                <h3>Accepted</h3>
                <h2 id="acceptedApplications">0</h2>
            </div>
        </section>

        <section class="internship-section">
            <div class="section-title">
                <h2>Applicants</h2>
            </div>

            <div id="applicationList">
                <div class="empty-state">
                    <h3>Loading applications...</h3>
                </div>
            </div>
        </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
