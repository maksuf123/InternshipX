<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | InternshipX</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="logo-section">

            <h1>
                <a
                    class="logo-link"
                    href="index.html"
                    aria-label="Go to InternshipX homepage">
                    Internship<span>X</span>
                </a>
            </h1>

            <p>Launch Your Career</p>

        </div>

        <h2>Create Account</h2>

        <p class="subtitle">
            Join InternshipX and discover internships from top companies.
        </p>

        <form id="registerForm">

            <!-- Name -->

            <div class="input-group">

                <label>Full Name</label>

                <div class="input-box">

                    <i data-lucide="user"></i>

                    <input
                        type="text"
                        id="name"
                        placeholder="Enter your full name"
                        required
                    >

                </div>

                <small id="nameError"></small>

            </div>

            <!-- Email -->

            <div class="input-group">

                <label>Email Address</label>

                <div class="input-box">

                    <i data-lucide="mail"></i>

                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required
                    >

                </div>

                <small id="emailError"></small>

            </div>

            <!-- Password -->

            <div class="input-group">

                <label>Password</label>

                <div class="input-box">

                    <i data-lucide="lock"></i>

                    <input
                        type="password"
                        id="password"
                        placeholder="Minimum 8 characters"
                        required
                    >

                </div>

                <small id="passwordError"></small>

            </div>

            <div class="input-group">
                <label for="role">I am a</label>
                <div class="input-box">
                    <i data-lucide="graduation-cap" id="roleIcon"></i>
                    <select id="role" name="role" required style="width: 100%; border: none; background: transparent; outline: none; font-size: 1rem; color: inherit; padding-left: 5px;">
                        <option value="student" style="background-color: #ffffff; color: #1e293b;">Student</option>
                        <option value="company" style="background-color: #ffffff; color: #1e293b;">Company</option>
                    </select>
                </div>
            </div>

            <div class="input-group" id="studentFields">
                <label>College / University</label>
                <div class="input-box">
                    <i data-lucide="book-open"></i>
                    <input
                        type="text"
                        id="college"
                        placeholder="e.g. MIT University"
                    >
                </div>
            </div>

            <div id="companyFields" style="display: none;">
                <div class="input-group">
                    <label>Industry</label>
                    <div class="input-box">
                        <i data-lucide="building"></i>
                        <input
                            type="text"
                            id="industry"
                            placeholder="e.g. Software"
                        >
                    </div>
                </div>

                <div class="input-group">
                    <label>Location</label>
                    <div class="input-box">
                        <i data-lucide="map-pin"></i>
                        <input
                            type="text"
                            id="location"
                            placeholder="e.g. Bangalore"
                        >
                    </div>
                </div>
            </div>

            <button
                id="registerBtn"
                type="submit"
                class="btn-primary"
            >

                Create Account

            </button>

        </form>

        <div id="message"></div>

        <div class="bottom-text">

            Already have an account?

            <a href="login.html">

                Login

            </a>

        </div>

    </div>

</div>

<script>
    lucide.createIcons();

    const roleSelect = document.getElementById("role");
    const roleIcon = document.getElementById("roleIcon");
    const studentFields = document.getElementById("studentFields");
    const companyFields = document.getElementById("companyFields");

    roleSelect.addEventListener("change", () => {
        if (roleSelect.value === "student") {
            studentFields.style.display = "block";
            companyFields.style.display = "none";
            roleIcon.setAttribute("data-lucide", "graduation-cap");
        } else {
            studentFields.style.display = "none";
            companyFields.style.display = "block";
            roleIcon.setAttribute("data-lucide", "briefcase");
        }
        lucide.createIcons();
    });
</script>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
