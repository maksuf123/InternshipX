<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Forgot Password | InternshipX</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap"
          rel="stylesheet">
</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="logo-section">
            <h1>
                <a
                    class="logo-link"
                    href="index.html"
                    aria-label="Go to InternshipX homepage">
                    Internship<span>X</span>
                </a>
            </h1>
            <p>Launch Your Career</p>
        </div>

        <h2 id="fpTitle">Forgot Password</h2>

        <p class="subtitle" id="fpSubtitle">
            Enter your registered email to receive a password reset code.
        </p>

        <!-- Step 1: Enter Email -->
        <form id="forgotPasswordForm">

            <div class="input-group">
                <label>Email Address</label>
                <div class="input-box">
                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required>
                </div>
            </div>

            <button
                type="submit"
                id="sendCodeBtn"
                class="btn-primary">
                Send Reset Code
            </button>

            <p id="message"></p>

        </form>

        <!-- Step 2: Enter OTP -->
        <form id="verifyResetOtpForm" style="display: none;">

            <div class="input-group">
                <label>Email Address</label>
                <div class="input-box">
                    <input
                        type="email"
                        id="resetEmail"
                        readonly>
                </div>
            </div>

            <div class="input-group">
                <label>Reset Code</label>
                <div class="input-box">
                    <input
                        type="text"
                        id="resetOtp"
                        maxlength="6"
                        placeholder="Enter 6-digit code"
                        required>
                </div>
            </div>

            <div class="input-group">
                <label>New Password</label>
                <div class="input-box">
                    <input
                        type="password"
                        id="newPassword"
                        placeholder="Minimum 8 characters"
                        required>
                </div>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <div class="input-box">
                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Re-enter new password"
                        required>
                </div>
            </div>

            <button
                type="submit"
                id="resetPasswordBtn"
                class="btn-primary">
                Reset Password
            </button>

            <button
                type="button"
                id="resendResetBtn"
                class="btn-secondary">
                Resend Code
            </button>

            <p id="resetMessage"></p>

        </form>

        <div class="bottom-text">
            Back to
            <a href="login.html">Login</a>
        </div>

    </div>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>

</body>

</html>
